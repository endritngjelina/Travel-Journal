<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelLog Pro - Your Journey Companion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            overflow-x: hidden;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .logo i {
            font-size: 2rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .main-content {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            height: calc(100vh - 120px);
        }

        .map-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .map-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #333;
        }

        .map-controls {
            display: flex;
            gap: 0.5rem;
        }

        .control-btn {
            padding: 0.5rem;
            border: none;
            border-radius: 8px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: #667eea;
            color: white;
        }

        #map {
            width: 100%;
            height: calc(100% - 60px);
            border-radius: 12px;
            overflow: hidden;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-item {
            text-align: center;
            padding: 1rem;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .trip-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .trip-item {
            padding: 1rem;
            border-left: 4px solid #667eea;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 8px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .trip-item:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateX(4px);
        }

        .trip-item.active {
            background: rgba(102, 126, 234, 0.2);
            border-left-color: #764ba2;
        }

        .trip-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.25rem;
        }

        .trip-date {
            font-size: 0.8rem;
            color: #666;
        }

        .trip-locations {
            font-size: 0.8rem;
            color: #667eea;
            margin-top: 0.25rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .photo-upload {
            position: relative;
            margin-bottom: 1rem;
        }

        .photo-preview {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background: rgba(102, 126, 234, 0.05);
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .search-bar {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        .floating-action {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .floating-action:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        .toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: #4CAF50;
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 3000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #f44336;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .sidebar {
                order: -1;
            }
            
            .main-content {
                padding: 1rem;
            }
            
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.7);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-map-marked-alt"></i>
                    <span>TravelLog Pro</span>
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="exportData()">
                        <i class="fas fa-download"></i>
                        Export
                    </button>
                    <button class="btn btn-primary" onclick="openAddTripModal()">
                        <i class="fas fa-plus"></i>
                        Add Trip
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="dashboard">
                <div class="map-section">
                    <div class="map-header">
                        <h2 class="map-title">Your Journey Map</h2>
                        <div class="map-controls">
                            <button class="control-btn" onclick="toggleMapStyle()" title="Toggle Map Style">
                                <i class="fas fa-layer-group"></i>
                            </button>
                            <button class="control-btn" onclick="fitMapToMarkers()" title="Fit to Markers">
                                <i class="fas fa-expand-arrows-alt"></i>
                            </button>
                            <button class="control-btn" onclick="toggleFullscreen()" title="Fullscreen">
                                <i class="fas fa-expand"></i>
                            </button>
                        </div>
                    </div>
                    <div id="map"></div>
                </div>

                <div class="sidebar">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Travel Statistics</h3>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-number" id="totalTrips">0</div>
                                <div class="stat-label">Total Trips</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number" id="totalLocations">0</div>
                                <div class="stat-label">Locations</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number" id="countriesVisited">0</div>
                                <div class="stat-label">Countries</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number" id="totalDistance">0</div>
                                <div class="stat-label">Miles</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Trip History</h3>
                        </div>
                        <div class="search-bar">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" class="search-input" placeholder="Search trips..." onkeyup="searchTrips(this.value)">
                        </div>
                        <div class="trip-list" id="tripList"></div>
                    </div>
                </div>
            </div>
        </main>

        <div class="floating-action" onclick="openAddTripModal()">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <!-- Add Trip Modal -->
    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Add New Trip</h3>
                <button class="close-btn" onclick="closeModal('addTripModal')">&times;</button>
            </div>
            <form id="addTripForm">
                <div class="form-group">
                    <label class="form-label">Trip Name</label>
                    <input type="text" class="form-input" name="tripName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Start Date</label>
                    <input type="date" class="form-input" name="startDate" required>
                </div>
                <div class="form-group">
                    <label class="form-label">End Date</label>
                    <input type="date" class="form-input" name="endDate" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-input form-textarea" name="description" placeholder="Tell us about your trip..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-input" name="location" placeholder="Enter location..." required>
                </div>
                <div class="form-group">
                    <label class="form-label">Photo</label>
                    <div class="photo-upload">
                        <input type="file" id="tripPhoto" accept="image/*" style="display: none;" onchange="previewPhoto(this)">
                        <img id="photoPreview" class="photo-preview" style="display: none;">
                        <div class="upload-btn" onclick="document.getElementById('tripPhoto').click()">
                            <i class="fas fa-camera"></i>
                            <span>Add Photo</span>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i>
                    Save Trip
                </button>
            </form>
        </div>
    </div>

    <!-- Trip Details Modal -->
    <div id="tripDetailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Trip Details</h3>
                <button class="close-btn" onclick="closeModal('tripDetailsModal')">&times;</button>
            </div>
            <div id="tripDetailsContent"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script>
        // Application State
        let map;
        let trips = [];
        let selectedTrip = null;
        let markers = [];
        let currentMapStyle = 'street';

        // Initialize application
        document.addEventListener('DOMContentLoaded', function() {
            initializeMap();
            loadTrips();
            updateStats();
        });

        // Map initialization
        function initializeMap() {
            map = L.map('map').setView([40.7128, -74.0060], 2);
            
            // Default tile layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Add click event to map
            map.on('click', function(e) {
                if (selectedTrip) {
                    addLocationToTrip(e.latlng);
                }
            });
        }

        // Toggle map style
        function toggleMapStyle() {
            map.eachLayer((layer) => {
                if (layer instanceof L.TileLayer) {
                    map.removeLayer(layer);
                }
            });

            if (currentMapStyle === 'street') {
                L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
                currentMapStyle = 'satellite';
            } else {
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
                currentMapStyle = 'street';
            }
        }

        // Fit map to markers
        function fitMapToMarkers() {
            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            const mapContainer = document.querySelector('.map-section');
            if (!document.fullscreenElement) {
                mapContainer.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Trip management
        function openAddTripModal() {
            document.getElementById('addTripModal').style.display = 'block';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Handle trip form submission
        document.getElementById('addTripForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const photoFile = document.getElementById('tripPhoto').files[0];
            
            // Geocode location
            geocodeLocation(formData.get('location'), function(coordinates) {
                if (coordinates) {
                    const trip = {
                        id: Date.now(),
                        name: formData.get('tripName'),
                        startDate: formData.get('startDate'),
                        endDate: formData.get('endDate'),
                        description: formData.get('description'),
                        location: formData.get('location'),
                        coordinates: coordinates,
                        photo: photoFile ? URL.createObjectURL(photoFile) : null,
                        locations: [coordinates],
                        createdAt: new Date().toISOString()
                    };
                    
                    trips.push(trip);
                    saveTrips();
                    addTripToMap(trip);
                    renderTripList();
                    updateStats();
                    
                    closeModal('addTripModal');
                    e.target.reset();
                    document.getElementById('photoPreview').style.display = 'none';
                    showToast('Trip added successfully!');
                } else {
                    showToast('Could not find location. Please try again.', 'error');
                }
            });
        });

        // Geocoding function
        function geocodeLocation(location, callback) {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        callback({
                            lat: parseFloat(data[0].lat),
                            lng: parseFloat(data[0].lon),
                            name: data[0].display_name
                        });
                    } else {
                        callback(null);
                    }
                })
                .catch(error => {
                    console.error('Geocoding error:', error);
                    callback(null);
                });
        }

        // Add trip to map
        function addTripToMap(trip) {
            const marker = L.marker([trip.coordinates.lat, trip.coordinates.lng])
                .addTo(map)
                .bindPopup(`
                    <div style="text-align: center; max-width: 200px;">
                        <h4>${trip.name}</h4>
                        <p><strong>Date:</strong> ${formatDate(trip.startDate)} - ${formatDate(trip.endDate)}</p>
                        <p>${trip.description}</p>
                        ${trip.photo ? `<img src="${trip.photo}" style="width: 100%; max-width: 150px; border-radius: 8px; margin-top: 8px;">` : ''}
                        <button onclick="selectTrip(${trip.id})" style="margin-top: 8px; padding: 4px 8px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">View Details</button>
                    </div>
                `);
            
            markers.push(marker);
        }

        // Select trip
        function selectTrip(tripId) {
            selectedTrip = trips.find(trip => trip.id === tripId);
            showTripDetails(selectedTrip);
            
            // Update trip list UI
            document.querySelectorAll('.trip-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-trip-id="${tripId}"]`).classList.add('active');
        }

        // Show trip details
        function showTripDetails(trip) {
            const content = `
                <div style="text-align: center;">
                    ${trip.photo ? `<img src="${trip.photo}" style="width: 100%; max-width: 300px; border-radius: 12px; margin-bottom: 1rem;">` : ''}
                    <h3>${trip.name}</h3>
                    <p><strong>Duration:</strong> ${formatDate(trip.startDate)} - ${formatDate(trip.endDate)}</p>
                    <p><strong>Location:</strong> ${trip.location}</p>
                    <p style="margin-top: 1rem;">${trip.description}</p>
                    <div style="margin-top: 1.5rem;">
                        <button onclick="deleteTrip(${trip.id})" class="btn" style="background: #f44336; color: white; margin-right: 0.5rem;">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                        <button onclick="shareTrip(${trip.id})" class="btn btn-primary">
                            <i class="fas fa-share"></i> Share
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('tripDetailsContent').innerHTML = content;
            document.getElementById('tripDetailsModal').style.display = 'block';
        }

        // Delete trip
        function deleteTrip(tripId) {
            if (confirm('Are you sure you want to delete this trip?')) {
                trips = trips.filter(trip => trip.id !== tripId);
                saveTrips();
                loadTrips();
                updateStats();
                closeModal('tripDetailsModal');
                showToast('Trip deleted successfully!');
            }
        }

        // Share trip
        function shareTrip(tripId) {
            const trip = trips.find(t => t.id === tripId);
            if (navigator.share) {
                navigator.share({
                    title: trip.name,
                    text: `Check out my trip to ${trip.location}!`,
                    url: window.location.href
                });
            } else {
                // Fallback for browsers that don't support Web Share API
                navigator.clipboard.writeText(`Check out my trip to ${trip.location}! ${trip.description}`);
                showToast('Trip details copied to clipboard!');
            }
        }

        // Render trip list
        function renderTripList() {
            const tripList = document.getElementById('tripList');
            tripList.innerHTML = '';
            
            trips.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(trip => {
                const tripItem = document.createElement('div');
                tripItem.className = 'trip-item';
                tripItem.setAttribute('data-trip-id', trip.id);
                tripItem.onclick = () => selectTrip(trip.id);
                
                tripItem.innerHTML = `
                    <div class="trip-name">${trip.name}</div>
                    <div class="trip-date">${formatDate(trip.startDate)} - ${formatDate(trip.endDate)}</div>
                    <div class="trip-locations"><i class="fas fa-map-marker-alt"></i> ${trip.location}</div>

        }

        // Search trips
        function searchTrips(query) {
            const tripItems = document.querySelectorAll('.trip-item');
            tripItems.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(query.toLowerCase())) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Update statistics
        function updateStats() {
            const totalTrips = trips.length;
            const totalLocations = trips.reduce((sum, trip) => sum + trip.locations.length, 0);
            const countriesVisited = new Set(trips.map(trip => trip.location.split(',').pop().trim())).size;
            const totalDistance = calculateTotalDistance();
            
            document.getElementById('totalTrips').textContent = totalTrips;
            document.getElementById('totalLocations').textContent = totalLocations;
            document.getElementById('countriesVisited').textContent = countriesVisited;
            document.getElementById('totalDistance').textContent = totalDistance.toLocaleString();
        }

        // Calculate total distance traveled
        function calculateTotalDistance() {
            let totalDistance = 0;
            for (let i = 0; i < trips.length - 1; i++) {
                const trip1 = trips[i];
                const trip2 = trips[i + 1];
                totalDistance += getDistance(trip1.coordinates, trip2.coordinates);
            }
            return Math.round(totalDistance);
        }

        // Calculate distance between two points using Haversine formula
        function getDistance(coord1, coord2) {
            const R = 3959; // Earth's radius in miles
            const dLat = (coord2.lat - coord1.lat) * Math.PI / 180;
            const dLon = (coord2.lng - coord1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(coord1.lat * Math.PI / 180) * Math.cos(coord2.lat * Math.PI / 180) *
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function addLocationToTrip(latlng) {
            if (selectedTrip) {

                    lat: latlng.lat,
                    lng: latlng.lng,
                    name: `Location ${selectedTrip.locations.length + 1}`,
                    timestamp: new Date().toISOString()
                };
                
                selectedTrip.locations.push(newLocation);
                saveTrips();
                
                // Add marker for new location
                const marker = L.marker([latlng.lat, latlng.lng])
                    .addTo(map)
                    .bindPopup(`

                            <p>Added to: ${selectedTrip.name}</p>
                            <p>${formatDate(newLocation.timestamp)}</p>
                        </div>
                    `);
                
                markers.push(marker);
                updateStats();
                showToast('Location added to trip!');
            }
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',

                day: 'numeric'

        // Export data
        function exportData() {
            const dataStr = JSON.stringify(trips, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `travel-journal-${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showToast('Data exported successfully!');

        // Import data (you can add this functionality)
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const importedTrips = JSON.parse(e.target.result);
                            trips = [...trips, ...importedTrips];
                            saveTrips();
                            loadTrips();
                            updateStats();
                            showToast('Data imported successfully!');
                        } catch (error) {
                            showToast('Error importing data. Please check the file format.', 'error');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // Trip analytics
        function generateTripAnalytics() {
            const analytics = {
                totalTrips: trips.length,
                averageTripDuration: calculateAverageTripDuration(),
                mostVisitedCountry: getMostVisitedCountry(),
                longestTrip: getLongestTrip(),
                shortestTrip: getShortestTrip(),
                totalDistance: calculateTotalDistance(),
                tripsThisYear: getTripsThisYear(),
                monthlyBreakdown: getMonthlyTripBreakdown()
            };
            return analytics;
        }

        function calculateAverageTripDuration() {
            if (trips.length === 0) return 0;
            const totalDays = trips.reduce((sum, trip) => {
                const start = new Date(trip.startDate);
                const end = new Date(trip.endDate);
                return sum + (end - start) / (1000 * 60 * 60 * 24);
            }, 0);
            return Math.round(totalDays / trips.length);
        }

        function getMostVisitedCountry() {
            const countries = {};
            trips.forEach(trip => {
                const country = trip.location.split(',').pop().trim();
                countries[country] = (countries[country] || 0) + 1;
            });
            return Object.keys(countries).reduce((a, b) => countries[a] > countries[b] ? a : b, '');
        }

        function getLongestTrip() {
            return trips.reduce((longest, trip) => {
                const duration = new Date(trip.endDate) - new Date(trip.startDate);
                const longestDuration = new Date(longest.endDate) - new Date(longest.startDate);
                return duration > longestDuration ? trip : longest;
            }, trips[0]);
        }

        function getShortestTrip() {
            return trips.reduce((shortest, trip) => {
                const duration = new Date(trip.endDate) - new Date(trip.startDate);
                const shortestDuration = new Date(shortest.endDate) - new Date(shortest.startDate);
                return duration < shortestDuration ? trip : shortest;
            }, trips[0]);
        }

        function getTripsThisYear() {
            const currentYear = new Date().getFullYear();
            return trips.filter(trip => new Date(trip.startDate).getFullYear() === currentYear).length;
        }

        function getMonthlyTripBreakdown() {
            const months = {};
            trips.forEach(trip => {
                const month = new Date(trip.startDate).toLocaleString('default', { month: 'long' });
                months[month] = (months[month] || 0) + 1;
            });
            return months;
        }

        // Advanced map features
        function createTripRoute(trip) {
            if (trip.locations.length > 1) {
                const latlngs = trip.locations.map(loc => [loc.lat, loc.lng]);
                const polyline = L.polyline(latlngs, {
                    color: '#667eea',
                    weight: 3,
                    opacity: 0.8
                }).addTo(map);
                
                return polyline;
            }
            return null;
        }

        // Enhanced trip clustering
        function clusterNearbyTrips() {
            const clusters = [];
            const processed = new Set();
            
            trips.forEach((trip, index) => {
                if (processed.has(index)) return;
                
                const cluster = [trip];
                processed.add(index);
                
                trips.forEach((otherTrip, otherIndex) => {
                    if (index !== otherIndex && !processed.has(otherIndex)) {
                        const distance = getDistance(trip.coordinates, otherTrip.coordinates);
                        if (distance < 100) { // Within 100 miles
                            cluster.push(otherTrip);
                            processed.add(otherIndex);
                        }
                    }
                });
                
                clusters.push(cluster);
            });
            
            return clusters;
        }
