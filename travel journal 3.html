<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelTracker Pro - Professional Travel Journal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-weight: 500;
        }

        .stat-item i {
            color: #667eea;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            height: calc(100vh - 200px);
        }

        .map-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.8);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        #map {
            height: calc(100% - 70px);
            border-radius: 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 25px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .trip-item {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .trip-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.9);
        }

        .trip-item.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .trip-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 8px;
        }

        .trip-title {
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
        }

        .trip-date {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .trip-location {
            color: #667eea;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .trip-notes {
            color: #555;
            font-size: 0.85rem;
            margin-top: 8px;
            line-height: 1.4;
        }

        .trip-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 5px 8px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.8);
            color: #666;
            font-size: 0.8rem;
        }

        .action-btn:hover {
            background: #667eea;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .modal h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .filter-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .filter-tab {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.7);
            color: #666;
        }

        .filter-tab.active {
            background: #667eea;
            color: white;
        }

        .export-section {
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            padding-top: 20px;
            margin-top: 20px;
        }

        .weather-info {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .photo-gallery {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .photo-thumb {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            object-fit: cover;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .photo-thumb:hover {
            transform: scale(1.1);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #f44336;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 400px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .stats-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-globe-americas"></i>TravelTracker Pro</h1>
            <p class="subtitle">Professional Travel Journal & Location Tracking System</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <i class="fas fa-map-marker-alt"></i>
                <span id="totalTrips">0 Trips</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-globe"></i>
                <span id="totalCountries">0 Countries</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-camera"></i>
                <span id="totalPhotos">0 Photos</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-route"></i>
                <span id="totalDistance">0 km</span>
            </div>
        </div>

        <div class="main-content">
            <div class="map-section">
                <div class="controls">
                    <button class="btn btn-primary" onclick="addTrip()">
                        <i class="fas fa-plus"></i> Add Trip
                    </button>
                    <button class="btn btn-secondary" onclick="toggleHeatmap()">
                        <i class="fas fa-fire"></i> Heatmap
                    </button>
                    <button class="btn btn-secondary" onclick="showRoutes()">
                        <i class="fas fa-route"></i> Routes
                    </button>
                    <button class="btn btn-secondary" onclick="exportData()">
                        <i class="fas fa-download"></i> Export
                    </button>
                </div>
                <div id="map"></div>
            </div>

            <div class="sidebar">
                <h2><i class="fas fa-journal-whills"></i>Travel Journal</h2>
                
                <input type="text" class="search-box" placeholder="Search trips..." onkeyup="searchTrips(this.value)">
                
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterTrips('all')">All</button>
                    <button class="filter-tab" onclick="filterTrips('recent')">Recent</button>
                    <button class="filter-tab" onclick="filterTrips('favorites')">Favorites</button>
                </div>

                <div id="tripsList">
                    <!-- Trip items will be populated here -->
                </div>

                <div class="loading">
                    <div class="spinner"></div>
                    Loading trips...
                </div>

                <div class="export-section">
                    <h3>Export Options</h3>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="btn btn-secondary" onclick="exportPDF()">
                            <i class="fas fa-file-pdf"></i> PDF
                        </button>
                        <button class="btn btn-secondary" onclick="exportJSON()">
                            <i class="fas fa-file-code"></i> JSON
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Trip Modal -->
    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <h3>Add New Trip</h3>
            <form id="tripForm">
                <div class="form-group">
                    <label for="tripTitle">Trip Title</label>
                    <input type="text" id="tripTitle" required>
                </div>
                <div class="form-group">
                    <label for="tripLocation">Location</label>
                    <input type="text" id="tripLocation" placeholder="City, Country" required>
                </div>
                <div class="form-group">
                    <label for="tripDate">Date</label>
                    <input type="date" id="tripDate" required>
                </div>
                <div class="form-group">
                    <label for="tripCategory">Category</label>
                    <select id="tripCategory">
                        <option value="vacation">Vacation</option>
                        <option value="business">Business</option>
                        <option value="adventure">Adventure</option>
                        <option value="cultural">Cultural</option>
                        <option value="family">Family</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tripNotes">Notes</label>
                    <textarea id="tripNotes" placeholder="Share your experience..."></textarea>
                </div>
                <div class="form-group">
                    <label for="tripPhotos">Photos</label>
                    <input type="file" id="tripPhotos" accept="image/*" multiple>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="tripFavorite"> Mark as favorite
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Trip</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
    <script>
        // Application State
        let map;
        let trips = [];
        let markers = [];
        let heatmapLayer;
        let routeLayer;
        let selectedTrip = null;
        let currentFilter = 'all';

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            initializeMap();
            loadTrips();
            updateStatistics();
        });

        // Initialize Leaflet map
        function initializeMap() {
            map = L.map('map').setView([40.7128, -74.0060], 2);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Add click event to map for adding trips
            map.on('click', function(e) {
                if (document.getElementById('addTripModal').style.display === 'none') {
                    const lat = e.latlng.lat;
                    const lng = e.latlng.lng;
                    
                    // Reverse geocoding simulation
                    reverseGeocode(lat, lng).then(location => {
                        document.getElementById('tripLocation').value = location;
                        addTrip();
                    });
                }
            });
        }

        // Reverse geocoding simulation
        async function reverseGeocode(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                return data.display_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            } catch (error) {
                return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            }
        }

        // Add new trip
        function addTrip() {
            document.getElementById('addTripModal').style.display = 'block';
            document.getElementById('tripForm').reset();
            document.getElementById('tripDate').value = new Date().toISOString().split('T')[0];
        }

        // Close modal
        function closeModal() {
            document.getElementById('addTripModal').style.display = 'none';
        }

        // Handle form submission
        document.getElementById('tripForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            showLoading(true);
            
            const formData = new FormData(this);
            const tripData = {
                id: Date.now(),
                title: formData.get('tripTitle') || document.getElementById('tripTitle').value,
                location: formData.get('tripLocation') || document.getElementById('tripLocation').value,
                date: formData.get('tripDate') || document.getElementById('tripDate').value,
                category: formData.get('tripCategory') || document.getElementById('tripCategory').value,
                notes: formData.get('tripNotes') || document.getElementById('tripNotes').value,
                favorite: document.getElementById('tripFavorite').checked,
                photos: [],
                coordinates: await geocodeLocation(document.getElementById('tripLocation').value),
                weather: await getWeatherData(document.getElementById('tripLocation').value)
            };

            // Handle photo uploads
            const photoFiles = document.getElementById('tripPhotos').files;
            for (let file of photoFiles) {
                if (file.type.startsWith('image/')) {
                    const photoData = await readFileAsDataURL(file);
                    tripData.photos.push({
                        name: file.name,
                        data: photoData,
                        size: file.size
                    });
                }
            }

            trips.push(tripData);
            saveTrips();
            addMarkerToMap(tripData);
            updateTripsList();
            updateStatistics();
            closeModal();
            showLoading(false);
            showToast('Trip added successfully!');
        });

        // Geocoding function
        async function geocodeLocation(location) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`);
                const data = await response.json();
                if (data.length > 0) {
                    return {
                        lat: parseFloat(data[0].lat),
                        lng: parseFloat(data[0].lon)
                    };
                }
            } catch (error) {
                console.error('Geocoding failed:', error);
            }
            return { lat: 0, lng: 0 };
        }

        // Weather data simulation
        async function getWeatherData(location) {
            const weatherConditions = ['Sunny', 'Partly Cloudy', 'Cloudy', 'Rainy', 'Snowy'];
            const temp = Math.floor(Math.random() * 35) + 5;
            const condition = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
            
            return {
                temperature: temp,
                condition: condition,
                humidity: Math.floor(Math.random() * 100),
                windSpeed: Math.floor(Math.random() * 20)
            };
        }

        // Read file as data URL
        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        // Add marker to map
        function addMarkerToMap(trip) {
            if (trip.coordinates && trip.coordinates.lat !== 0) {
                const marker = L.marker([trip.coordinates.lat, trip.coordinates.lng])
                    .addTo(map)
                    .bindPopup(`
                        <div style="min-width: 200px;">
                            <h4>${trip.title}</h4>
                            <p><strong>Location:</strong> ${trip.location}</p>
                            <p><strong>Date:</strong> ${formatDate(trip.date)}</p>
                            <p><strong>Category:</strong> ${trip.category}</p>
                            ${trip.notes ? `<p><strong>Notes:</strong> ${trip.notes.substring(0, 100)}...</p>` : ''}
                            ${trip.weather ? `<p><strong>Weather:</strong> ${trip.weather.temperature}°C, ${trip.weather.condition}</p>` : ''}
                        </div>
                    `);
                
                markers.push({ marker, trip });
            }
        }

        // Update trips list
        function updateTripsList() {
            const tripsContainer = document.getElementById('tripsList');
            const filteredTrips = filterTripsByCategory(trips, currentFilter);
            
            tripsContainer.innerHTML = '';
            
            filteredTrips.forEach(trip => {
                const tripElement = createTripElement(trip);
                tripsContainer.appendChild(tripElement);
            });
        }

        // Create trip element
        function createTripElement(trip) {
            const div = document.createElement('div');
            div.className = 'trip-item';
            div.onclick = () => selectTrip(trip);
            
            div.innerHTML = `
                <div class="trip-actions">
                    <button class="action-btn" onclick="event.stopPropagation(); editTrip(${trip.id})">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="action-btn" onclick="event.stopPropagation(); deleteTrip(${trip.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                    <button class="action-btn ${trip.favorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${trip.id})">
                        <i class="fas fa-heart"></i>
                    </button>
                </div>
                <div class="trip-header">
                    <div class="trip-title">${trip.title}</div>
                </div>
                <div class="trip-date">${formatDate(trip.date)}</div>
                <div class="trip-location">
                    <i class="fas fa-map-marker-alt"></i>
                    ${trip.location}
                </div>
                <div class="trip-notes">${trip.notes || 'No notes added'}</div>
                ${trip.weather ? `<div class="weather-info">
                    <i class="fas fa-cloud-sun"></i>
                    ${trip.weather.temperature}°C, ${trip.weather.condition}
                </div>` : ''}
                ${trip.photos.length > 0 ? `<div class="photo-gallery">
                    ${trip.photos.slice(0, 3).map(photo => `
                        <img src="${photo.data}" alt="${photo.name}" class="photo-thumb" onclick="viewPhoto('${photo.data}')">
                    `).join('')}
                    ${trip.photos.length > 3 ? `<div style="font-size: 0.8rem; color: #666;">+${trip.photos.length - 3} more</div>` : ''}
                </div>` : ''}
            `;
            
            return div;
        }

        // Select trip
        function selectTrip(trip) {
            selectedTrip = trip;
            
            // Update UI
            document.querySelectorAll('.trip-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // Pan to location
            if (trip.coordinates && trip.coordinates.lat !== 0) {
                map.setView([trip.coordinates.lat, trip.coordinates.lng], 10);
            }
        }

        // Filter trips
        function filterTrips(category) {
            currentFilter = category;
            
            // Update tab states
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateTripsList();
        }

        // Filter trips by category
        function filterTripsByCategory(trips, category) {
            switch (category) {
                case 'recent':
                    return trips.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
                case 'favorites':
                    return trips.filter(trip => trip.favorite);
                default:
                    return trips.sort((a, b) => new Date(b.date) - new Date(a.date));
            }
        }

        // Search trips
        function searchTrips(query) {
            const tripsContainer = document.getElementById('tripsList');
            const filteredTrips = trips.filter(trip => 
                trip.title.toLowerCase().includes(query.toLowerCase()) ||
                trip.location.toLowerCase().includes(query.toLowerCase()) ||
                trip.notes.toLowerCase().includes(query.toLowerCase())
            );
            
            tripsContainer.innerHTML = '';
            filteredTrips.forEach(trip => {
                const tripElement = createTripElement(trip);
                tripsContainer.appendChild(tripElement);
            });
        }

        // Toggle favorite
        function toggleFavorite(tripId) {
            const trip = trips.find(t => t.id === tripId);
            if (trip) {
                trip.favorite = !trip.favorite;
                saveTrips();
                updateTripsList();
                showToast(trip.favorite ? 'Added to favorites' : 'Removed from favorites');
            }
        }

        // Delete trip
        function deleteTrip(tripId) {
            if (confirm('Are you sure you want to delete this trip?')) {
                trips = trips.filter(trip => trip.id !== tripId);
                
                // Remove marker from map
                const markerIndex = markers.findIndex(m => m.trip.id === tripId);
                if (markerIndex !== -1) {
                    map.removeLayer(markers[markerIndex].marker);
                    markers.splice(markerIndex, 1);
                }
                
                saveTrips();
                updateTripsList();
                updateStatistics();
                showToast('Trip deleted successfully');
            }
        }

        // Edit trip
        function editTrip(tripId) {
            const trip = trips.find(t => t.id === tripId);
            if (trip) {
                document.getElementById('tripTitle').value = trip.title;
                document.getElementById('tripLocation').value = trip.location;
                document.getElementById('tripDate').value = trip.date;
                document.getElementById('tripCategory').value = trip.category;
                document.getElementById('tripNotes').value = trip.notes || '';
                document.getElementById('tripFavorite').checked = trip.favorite;
                
                // Store the trip ID for updating
                document.getElementById('tripForm').dataset.editId = tripId;
                document.getElementById('addTripModal').style.display = 'block';
            }
        }

        // Update form submission to handle edits
        document.getElementById('tripForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            showLoading(true);
            
            const editId = this.dataset.editId;
            const formData = new FormData(this);
            
            const tripData = {
                id: editId ? parseInt(editId) : Date.now(),
                title: document.getElementById('tripTitle').value,
                location: document.getElementById('tripLocation').value,
                date: document.getElementById('tripDate').value,
                category: document.getElementById('tripCategory').value,
                notes: document.getElementById('tripNotes').value,
                favorite: document.getElementById('tripFavorite').checked,
                photos: [],
                coordinates: await geocodeLocation(document.getElementById('tripLocation').value),
                weather: await getWeatherData(document.getElementById('tripLocation').value)
            };

            // Handle photo uploads
            const photoFiles = document.getElementById('tripPhotos').files;
            for (let file of photoFiles) {
                if (file.type.startsWith('image/')) {
                    const photoData = await readFileAsDataURL(file);
                    tripData.photos.push({
                        name: file.name,
                        data: photoData,
                        size: file.size
                    });
                }
            }

            if (editId) {
                // Update existing trip
                const index = trips.findIndex(t => t.id === parseInt(editId));
                if (index !== -1) {
                    // Keep existing photos if no new ones uploaded
                    if (tripData.photos.length === 0) {
                        tripData.photos = trips[index].photos;
                    }
                    trips[index] = tripData;
                    
                    // Update marker
                    const markerIndex = markers.findIndex(m => m.trip.id === parseInt(editId));
                    if (markerIndex !== -1) {
                        map.removeLayer(markers[markerIndex].marker);
                        markers.splice(markerIndex, 1);
                    }
                    addMarkerToMap(tripData);
                }
                delete this.dataset.editId;
                showToast('Trip updated successfully!');
            } else {
                // Add new trip
                trips.push(tripData);
                addMarkerToMap(tripData);
                showToast('Trip added successfully!');
            }

            saveTrips();
            updateTripsList();
            updateStatistics();
            closeModal();
            showLoading(false);
        });

        // Toggle heatmap
        function toggleHeatmap() {
            if (heatmapLayer) {
                map.removeLayer(heatmapLayer);
                heatmapLayer = null;
            } else {
                const heatmapData = trips
                    .filter(trip => trip.coordinates && trip.coordinates.lat !== 0)
                    .map(trip => [trip.coordinates.lat, trip.coordinates.lng, 1]);
                
                if (heatmapData.length > 0) {
                    heatmapLayer = L.heatLayer(heatmapData, {
                        radius: 20,
                        blur: 15,
                        maxZoom: 17
                    }).addTo(map);
                    showToast('Heatmap enabled');
                } else {
                    showToast('No location data available for heatmap');
                }
            }
        }

        // Show routes
        function showRoutes() {
            if (routeLayer) {
                map.removeLayer(routeLayer);
                routeLayer = null;
                showToast('Routes hidden');
            } else {
                const sortedTrips = trips
                    .filter(trip => trip.coordinates && trip.coordinates.lat !== 0)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                
                if (sortedTrips.length > 1) {
                    const polylinePoints = sortedTrips.map(trip => [trip.coordinates.lat, trip.coordinates.lng]);
                    routeLayer = L.polyline(polylinePoints, {
                        color: '#667eea',
                        weight: 3,
                        opacity: 0.7
                    }).addTo(map);
                    showToast('Routes shown');
                } else {
                    showToast('Need at least 2 trips to show routes');
                }
            }
        }

        // View photo
        function viewPhoto(photoData) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'block';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 80%; text-align: center;">
                    <img src="${photoData}" style="max-width: 100%; max-height: 80vh; border-radius: 10px;">
                    <br><br>
                    <button class="btn btn-secondary" onclick="this.parentElement.parentElement.remove()">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            modal.onclick = function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            };
        }

        // Update statistics
        function updateStatistics() {
            const totalTrips = trips.length;
            const totalCountries = new Set(trips.map(trip => trip.location.split(',').pop()?.trim())).size;
            const totalPhotos = trips.reduce((sum, trip) => sum + trip.photos.length, 0);
            
            // Calculate total distance (approximation)
            let totalDistance = 0;
            const sortedTrips = trips
                .filter(trip => trip.coordinates && trip.coordinates.lat !== 0)
                .sort((a, b) => new Date(a.date) - new Date(b.date));
            
            for (let i = 1; i < sortedTrips.length; i++) {
                const prev = sortedTrips[i - 1];
                const curr = sortedTrips[i];
                totalDistance += calculateDistance(
                    prev.coordinates.lat, prev.coordinates.lng,
                    curr.coordinates.lat, curr.coordinates.lng
                );
            }
            
            document.getElementById('totalTrips').textContent = `${totalTrips} Trips`;
            document.getElementById('totalCountries').textContent = `${totalCountries} Countries`;
            document.getElementById('totalPhotos').textContent = `${totalPhotos} Photos`;
            document.getElementById('totalDistance').textContent = `${Math.round(totalDistance)} km`;
        }

        // Calculate distance between two points
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Export data
        function exportData() {
            const dataStr = JSON.stringify(trips, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `travel_journal_${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showToast('Data exported successfully!');
        }

        // Export to PDF
        function exportPDF() {
            const printWindow = window.open('', '_blank');
            const tripsList = trips.map(trip => `
                <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px;">
                    <h3>${trip.title}</h3>
                    <p><strong>Location:</strong> ${trip.location}</p>
                    <p><strong>Date:</strong> ${formatDate(trip.date)}</p>
                    <p><strong>Category:</strong> ${trip.category}</p>
                    ${trip.notes ? `<p><strong>Notes:</strong> ${trip.notes}</p>` : ''}
                    ${trip.weather ? `<p><strong>Weather:</strong> ${trip.weather.temperature}°C, ${trip.weather.condition}</p>` : ''}
                    ${trip.photos.length > 0 ? `<p><strong>Photos:</strong> ${trip.photos.length} attached</p>` : ''}
                </div>
            `).join('');
            
            printWindow.document.write(`
                <html>
                <head>
                    <title>Travel Journal Report</title>
                    <style>
                        body { font-family: Arial, sans-serif; margin: 20px; }
                        h1 { color: #667eea; }
                        .stats { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
                    </style>
                </head>
                <body>
                    <h1>Travel Journal Report</h1>
                    <div class="stats">
                        <p><strong>Total Trips:</strong> ${trips.length}</p>
                        <p><strong>Generated:</strong> ${new Date().toLocaleDateString()}</p>
                    </div>
                    ${tripsList}
                </body>
                </html>
            `);
            
            printWindow.document.close();
            setTimeout(() => {
                printWindow.print();
                printWindow.close();
            }, 250);
            
            showToast('PDF export ready!');
        }

        // Export to JSON
        function exportJSON() {
            exportData();
        }

        // Show loading state
        function showLoading(show) {
            const loading = document.querySelector('.loading');
            loading.style.display = show ? 'block' : 'none';
        }

        // Show toast notification
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // Save trips to localStorage
        function saveTrips() {
            // Note: In a real application, this would use localStorage
            // For demonstration purposes, we'll use a simple object
            if (typeof(Storage) !== "undefined") {
                try {
                    localStorage.setItem('travelJournalTrips', JSON.stringify(trips));
                } catch (e) {
                    console.warn('Local storage not available, using memory storage');
                }
            }
        }

        // Load trips from localStorage
        function loadTrips() {
            // Note: In a real application, this would load from localStorage
            // For demonstration purposes, we'll load sample data
            if (typeof(Storage) !== "undefined") {
                try {
                    const savedTrips = localStorage.getItem('travelJournalTrips');
                    if (savedTrips) {
                        trips = JSON.parse(savedTrips);
                    } else {
                        loadSampleData();
                    }
                } catch (e) {
                    console.warn('Could not load from localStorage, using sample data');
                    loadSampleData();
                }
            } else {
                loadSampleData();
            }
            
            // Add markers to map
            trips.forEach(trip => {
                addMarkerToMap(trip);
            });
            
            updateTripsList();
        }
