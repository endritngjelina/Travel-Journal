<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyager - Professional Travel Journal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --accent-color: #f59e0b;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --dark-bg: #1f2937;
            --light-bg: #f8fafc;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2.5em;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header-subtitle {
            color: var(--text-light);
            font-size: 1.1em;
            font-weight: 500;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 200px);
        }

        .left-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow-y: auto;
        }

        .map-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #map {
            height: 100%;
            width: 100%;
            min-height: 600px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-secondary {
            background: var(--gradient-secondary);
            color: white;
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            transform: translateY(-1px);
        }

        .journal-entry {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .journal-entry::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
        }

        .journal-entry:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }

        .entry-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 15px;
        }

        .entry-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .entry-date {
            color: var(--text-light);
            font-size: 0.9em;
            font-weight: 500;
        }

        .entry-location {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .entry-notes {
            color: var(--text-dark);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .entry-photos {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .photo-thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--border-color);
        }

        .photo-thumbnail:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.2);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }

        .search-container {
            position: relative;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.8);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--text-dark);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: var(--border-color);
            transform: rotate(90deg);
        }

        .filter-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 600;
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .export-options {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .map-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .map-control-btn {
            padding: 10px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .map-control-btn:hover {
            background: white;
            transform: translateY(-1px);
        }

        .weather-widget {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .weather-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weather-icon {
            font-size: 2em;
            color: var(--accent-color);
        }

        .weather-details h4 {
            margin: 0;
            font-size: 1.1em;
            color: var(--text-dark);
        }

        .weather-details p {
            margin: 5px 0 0 0;
            color: var(--text-light);
            font-size: 0.9em;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 10px;
            }
            
            .header {
                padding: 15px 20px;
            }
            
            .left-panel {
                padding: 20px;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                width: 95%;
                padding: 20px;
            }
        }

        .leaflet-popup-content {
            font-family: inherit;
        }

        .custom-popup {
            max-width: 300px;
        }

        .custom-popup h3 {
            margin: 0 0 10px 0;
            color: var(--text-dark);
            font-size: 1.2em;
        }

        .custom-popup p {
            margin: 5px 0;
            color: var(--text-light);
            font-size: 0.9em;
        }

        .custom-popup .popup-date {
            color: var(--primary-color);
            font-weight: 600;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 1001;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--success-color);
        }

        .notification.error {
            background: var(--danger-color);
        }

        .photo-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .photo-upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(37, 99, 235, 0.05);
        }

        .photo-upload-area.dragover {
            border-color: var(--primary-color);
            background: rgba(37, 99, 235, 0.1);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1><i class="fas fa-globe-americas"></i> Voyager</h1>
            <p class="header-subtitle">Professional Travel Journal with Advanced Analytics & Mapping</p>
        </header>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-number" id="totalTrips">0</div>
                <div class="stat-label">Total Trips</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="countriesVisited">0</div>
                <div class="stat-label">Countries</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalDistance">0</div>
                <div class="stat-label">km Traveled</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalPhotos">0</div>
                <div class="stat-label">Photos</div>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="controls">
                    <button class="btn btn-primary" onclick="openAddTripModal()">
                        <i class="fas fa-plus"></i> Add Trip
                    </button>
                    <button class="btn btn-secondary" onclick="exportData()">
                        <i class="fas fa-download"></i> Export Data
                    </button>
                    <button class="btn btn-success" onclick="generateReport()">
                        <i class="fas fa-chart-line"></i> Generate Report
                    </button>
                </div>

                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search trips, locations, notes..." id="searchInput">
                    <i class="fas fa-search search-icon"></i>
                </div>

                <div class="filter-controls">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="recent">Recent</button>
                    <button class="filter-btn" data-filter="favorites">Favorites</button>
                    <button class="filter-btn" data-filter="business">Business</button>
                    <button class="filter-btn" data-filter="leisure">Leisure</button>
                </div>

                <div class="weather-widget" id="weatherWidget" style="display: none;">
                    <div class="weather-info">
                        <i class="fas fa-sun weather-icon"></i>
                        <div class="weather-details">
                            <h4 id="weatherLocation">Current Location</h4>
                            <p id="weatherDescription">Loading weather...</p>
                        </div>
                    </div>
                </div>

                <div id="journalEntries">
                    <div class="empty-state">
                        <i class="fas fa-map-marked-alt"></i>
                        <h3>No trips yet</h3>
                        <p>Start documenting your adventures by adding your first trip!</p>
                    </div>
                </div>
            </div>

            <div class="map-container">
                <div class="map-controls">
                    <button class="map-control-btn" onclick="toggleSatelliteView()" title="Toggle Satellite View">
                        <i class="fas fa-satellite"></i>
                    </button>
                    <button class="map-control-btn" onclick="centerMap()" title="Center Map">
                        <i class="fas fa-crosshairs"></i>
                    </button>
                    <button class="map-control-btn" onclick="toggleHeatmap()" title="Toggle Heatmap">
                        <i class="fas fa-fire"></i>
                    </button>
                </div>
                <div id="map"></div>
            </div>
        </div>
    </div>

    <!-- Add Trip Modal -->
    <div id="addTripModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add New Trip</h2>
                <button class="close-btn" onclick="closeAddTripModal()">×</button>
            </div>
            <form id="tripForm">
                <div class="form-group">
                    <label for="tripTitle">Trip Title</label>
                    <input type="text" id="tripTitle" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="tripLocation">Location</label>
                    <input type="text" id="tripLocation" class="form-control" placeholder="Click on map or enter manually" required>
                </div>
                <div class="form-group">
                    <label for="tripDate">Date</label>
                    <input type="date" id="tripDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="tripType">Trip Type</label>
                    <select id="tripType" class="form-control">
                        <option value="leisure">Leisure</option>
                        <option value="business">Business</option>
                        <option value="adventure">Adventure</option>
                        <option value="cultural">Cultural</option>
                        <option value="family">Family</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tripNotes">Notes</label>
                    <textarea id="tripNotes" class="form-control" rows="4" placeholder="Share your experiences, recommendations, memories..."></textarea>
                </div>
                <div class="form-group">
                    <label for="tripRating">Rating</label>
                    <select id="tripRating" class="form-control">
                        <option value="5">★★★★★ Excellent</option>
                        <option value="4">★★★★☆ Very Good</option>
                        <option value="3">★★★☆☆ Good</option>
                        <option value="2">★★☆☆☆ Fair</option>
                        <option value="1">★☆☆☆☆ Poor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Photos</label>
                    <div class="photo-upload-area" id="photoUploadArea">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2em; color: var(--text-light); margin-bottom: 10px;"></i>
                        <p>Drop photos here or click to select</p>
                        <input type="file" id="photoInput" multiple accept="image/*" style="display: none;">
                    </div>
                    <div class="photo-grid" id="photoGrid"></div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-save"></i> Save Trip
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script>
        // Global variables
        let map;
        let trips = [];
        let markers = [];
        let selectedLocation = null;
        let satelliteLayer;
        let streetLayer;
        let heatmapVisible = false;
        let currentPhotos = [];

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            initializeMap();
            loadTrips();
            setupEventListeners();
            updateStats();
            requestGeolocation();
        });

        function initializeMap() {
            map = L.map('map').setView([40.7128, -74.0060], 2);
            
            // Street layer
            streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            // Satellite layer
            satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            });

            // Map click handler
            map.on('click', function(e) {
                if (document.getElementById('addTripModal').style.display === 'block') {
                    selectedLocation = e.latlng;
                    reverseGeocode(e.latlng.lat, e.latlng.lng);
                }
            });
        }

        function setupEventListeners() {
            // Search functionality
            document.getElementById('searchInput').addEventListener('input', function(e) {
                filterTrips(e.target.value);
            });

            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    filterTripsByType(this.dataset.filter);
                });
            });

            // Form submission
            document.getElementById('tripForm').addEventListener('submit', function(e) {
                e.preventDefault();
                addTrip();
            });

            // Photo upload
            setupPhotoUpload();

            // Modal click outside to close
            document.getElementById('addTripModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeAddTripModal();
                }
            });
        }

        function setupPhotoUpload() {
            const uploadArea = document.getElementById('photoUploadArea');
            const photoInput = document.getElementById('photoInput');
            const photoGrid = document.getElementById('photoGrid');

            uploadArea.addEventListener('click', () => photoInput.click());
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });

            photoInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const photoId = Date.now() + Math.random();
                        currentPhotos.push({
                            id: photoId,
                            data: e.target.result,
                            name: file.name
                        });
                        displayPhoto(photoId, e.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function displayPhoto(photoId, photoData) {
            const photoGrid = document.getElementById('photoGrid');
            const photoItem = document.createElement('div');
            photoItem.className = 'photo-item';
            photoItem.innerHTML = `
                <img src="${photoData}" alt="Trip photo">
                <button class="photo-remove" onclick="removePhoto(${photoId})">×</button>
            `;
            photoGrid.appendChild(photoItem);
        }

        function removePhoto(photoId) {
            currentPhotos = currentPhotos.filter(photo => photo.id !== photoId);
            const photoGrid = document.getElementById('photoGrid');
            photoGrid.innerHTML = '';
            currentPhotos.forEach(photo => {
                displayPhoto(photo.id, photo.data);
            });
        }

        function requestGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        map.setView([lat, lng], 10);
                        showWeatherWidget(lat, lng);
                    },
                    (error) => {
                        console.log('Geolocation error:', error);
                    }
                );
            }
        }

        function showWeatherWidget(lat, lng) {
            // Simulate weather data (in a real app, you'd call a weather API)
            const weatherConditions = ['sunny', 'cloudy', 'rainy', 'snowy'];
            const temperatures = [15, 18, 22, 25, 28];
            const condition = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
            const temp = temperatures[Math.floor(Math.random() * temperatures.length)];
            
            const weatherWidget = document.getElementById('weatherWidget');
            const weatherIcon = document.querySelector('.weather-icon');
            const weatherLocation = document.getElementById('weatherLocation');
            const weatherDescription = document.getElementById('weatherDescription');
            
            const icons = {
                sunny: 'fas fa-sun',
                cloudy: 'fas fa-cloud',
                rainy: 'fas fa-cloud-rain',
                snowy: 'fas fa-snowflake'
            };
            
            weatherIcon.className = `weather-icon ${icons[condition]}`;
            weatherLocation.textContent = 'Current Location';
            weatherDescription.textContent = `${temp}°C, ${condition.charAt(0).toUpperCase() + condition.slice(1)}`;
            weatherWidget.style.display = 'block';
        }

        function reverseGeocode(lat, lng) {
            // Simulate reverse geocoding (in a real app, you'd use a geocoding service)
            const locationNames = [
                'New York, NY, USA',
                'Paris, France',
                'Tokyo, Japan',
                'London, UK',
                'Sydney, Australia',
                'Rio de Janeiro, Brazil',
                'Cairo, Egypt',
                'Mumbai, India'
            ];
            
            const randomLocation = locationNames[Math.floor(Math.random() * locationNames.length)];
            document.getElementById('tripLocation').value = randomLocation;
            
            // Add a temporary marker
            if (window.tempMarker) {
                map.removeLayer(window.tempMarker);
            }
            
            window.tempMarker = L.marker([lat, lng])
                .addTo(map)
                .bindPopup('Selected location')
                .openPopup();
        }

        function openAddTripModal() {
            document.getElementById('addTripModal').style.display = 'block';
            document.getElementById('tripDate').valueAsDate = new Date();
            currentPhotos = [];
            document.getElementById('photoGrid').innerHTML = '';
        }

        function closeAddTripModal() {
            document.getElementById('addTripModal').style.display = 'none';
            document.getElementById('tripForm').reset();
            selectedLocation = null;
            currentPhotos = [];
            document.getElementById('photoGrid').innerHTML = '';
            
            if (window.tempMarker) {
                map.removeLayer(window.tempMarker);
                window.tempMarker = null;
            }
        }

        function addTrip() {
            const title = document.getElementById('tripTitle').value;
            const location = document.getElementById('tripLocation').value;
            const date = document.getElementById('tripDate').value;
            const type = document.getElementById('tripType').value;
            const notes = document.getElementById('tripNotes').value;
            const rating = document.getElementById('tripRating').value;
            
            if (!selectedLocation) {
                // Generate random coordinates if no location selected
                selectedLocation = {
                    lat: (Math.random() - 0.5) * 180,
                    lng: (Math.random() - 0.5) * 360
                };
            }
            
            const trip = {
                id: Date.now(),
                title,
                location,
                date,
                type,
                notes,
                rating: parseInt(rating),
                lat: selectedLocation.lat,
                lng: selectedLocation.lng,
                photos: [...currentPhotos],
                country: extractCountry(location),
                timestamp: new Date().toISOString()
            };
            
            trips.push(trip);
            saveTrips();
            addMarkerToMap(trip);
            renderTrips();
            updateStats();
            closeAddTripModal();
            showNotification('Trip added successfully!', 'success');
        }

        function extractCountry(location) {
            const parts = location.split(',');
            return parts[parts.length - 1].trim();
        }

        function addMarkerToMap(trip) {
            const marker = L.marker([trip.lat, trip.lng])
                .addTo(map)
                .bindPopup(`
                    <div class="custom-popup">
                        <h3>${trip.title}</h3>
                        <p><i class="fas fa-map-marker-alt"></i> ${trip.location}</p>
                        <p class="popup-date"><i class="fas fa-calendar"></i> ${formatDate(trip.date)}</p>
                        <p><i class="fas fa-star"></i> ${generateStars(trip.rating)}</p>
                        <p>${trip.notes.substring(0, 100)}${trip.notes.length > 100 ? '...' : ''}</p>
                    </div>
                `);
            
            markers.push(marker);
        }

        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating ? '★' : '☆';
            }
            return stars;
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function renderTrips() {
            const container = document.getElementById('journalEntries');
            
            if (trips.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-map-marked-alt"></i>
                        <h3>No trips yet</h3>
                        <p>Start documenting your adventures by adding your first trip!</p>
                    </div>
                `;
                return;
            }
            
            const sortedTrips = [...trips].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            container.innerHTML = sortedTrips.map(trip => `
                <div class="journal-entry" data-trip-id="${trip.id}">
                    <div class="entry-header">
                        <h3 class="entry-title">${trip.title}</h3>
                        <span class="entry-date">${formatDate(trip.date)}</span>
                    </div>
                    <div class="entry-location">
                        <i class="fas fa-map-marker-alt"></i> ${trip.location}
                    </div>
                    <div class="entry-rating">
                        <i class="fas fa-star"></i> ${generateStars(trip.rating)} (${trip.rating}/5)
                    </div>
                    <div class="entry-notes">${trip.notes}</div>
                    ${trip.photos.length > 0 ? `
                        <div class="entry-photos">
                            ${trip.photos.map(photo => `
                                <img src="${photo.data}" alt="Trip photo" class="photo-thumbnail" onclick="viewPhoto('${photo.data}')">
                            `).join('')}
                        </div>
                    ` : ''}
                    <div class="entry-actions" style="margin-top: 15px;">
                        <button class="btn btn-secondary" onclick="viewOnMap(${trip.lat}, ${trip.lng})" style="font-size: 12px; padding: 6px 12px;">
                            <i class="fas fa-map"></i> View on Map
                        </button>
                        <button class="btn btn-danger" onclick="deleteTrip(${trip.id})" style="font-size: 12px; padding: 6px 12px;">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function viewPhoto(photoData) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'block';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 80%; text-align: center;">
                    <div class="modal-header">
                        <h2 class="modal-title">Photo View</h2>
                        <button class="close-btn" onclick="this.closest('.modal').remove()">×</button>
                    </div>
                    <img src="${photoData}" style="max-width: 100%; height: auto; border-radius: 10px;">
                </div>
            `;
            document.body.appendChild(modal);
        }

        function viewOnMap(lat, lng) {
            map.setView([lat, lng], 15);
            // Find and open the popup for this location
            markers.forEach(marker => {
                if (marker.getLatLng().lat === lat && marker.getLatLng().lng === lng) {
                    marker.openPopup();
                }
            });
        }

        function deleteTrip(tripId) {
            if (confirm('Are you sure you want to delete this trip?')) {
                trips = trips.filter(trip => trip.id !== tripId);
                
                // Remove marker from map
                markers.forEach((marker, index) => {
                    const trip = trips.find(t => t.lat === marker.getLatLng().lat && t.lng === marker.getLatLng().lng);
                    if (!trip) {
                        map.removeLayer(marker);
                        markers.splice(index, 1);
                    }
                });
                
                saveTrips();
                renderTrips();
                updateStats();
                showNotification('Trip deleted successfully!', 'success');
            }
        }

        function updateStats() {
            const totalTrips = trips.length;
            const countries = new Set(trips.map(trip => trip.country));
            const countriesVisited = countries.size;
            const totalPhotos = trips.reduce((sum, trip) => sum + trip.photos.length, 0);
            
            // Calculate approximate distance (simplified calculation)
            let totalDistance = 0;
            if (trips.length > 1) {
                const sortedTrips = [...trips].sort((a, b) => new Date(a.date) - new Date(b.date));
                for (let i = 1; i < sortedTrips.length; i++) {
                    const prev = sortedTrips[i - 1];
                    const curr = sortedTrips[i];
                    totalDistance += calculateDistance(prev.lat, prev.lng, curr.lat, curr.lng);
                }
            }
            
            document.getElementById('totalTrips').textContent = totalTrips;
            document.getElementById('countriesVisited').textContent = countriesVisited;
            document.getElementById('totalDistance').textContent = Math.round(totalDistance);
            document.getElementById('totalPhotos').textContent = totalPhotos;
        }

        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; // Radius of the Earth in km
            const dLat = deg2rad(lat2 - lat1);
            const dLng = deg2rad(lng2 - lng1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + 
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * 
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function deg2rad(deg) {
            return deg * (Math.PI/180);
        }

        function filterTrips(searchTerm) {
            const entries = document.querySelectorAll('.journal-entry');
            entries.forEach(entry => {
                const text = entry.textContent.toLowerCase();
                if (text.includes(searchTerm.toLowerCase())) {
                    entry.style.display = 'block';
                } else {
                    entry.style.display = 'none';
                }
            });
        }

        function filterTripsByType(type) {
            if (type === 'all') {
                renderTrips();
                return;
            }
            
            let filteredTrips = trips;
            
            if (type === 'recent') {
                const oneMonthAgo = new Date();
                oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
                filteredTrips = trips.filter(trip => new Date(trip.date) > oneMonthAgo);
            } else if (type === 'favorites') {
                filteredTrips = trips.filter(trip => trip.rating >= 4);
            } else {
                filteredTrips = trips.filter(trip => trip.type === type);
            }
            
            renderFilteredTrips(filteredTrips);
        }

        function renderFilteredTrips(filteredTrips) {
            const container = document.getElementById('journalEntries');
            
            if (filteredTrips.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No matching trips</h3>
                        <p>Try adjusting your filters or search terms.</p>
                    </div>
                `;
                return;
            }
            
            const sortedTrips = [...filteredTrips].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            container.innerHTML = sortedTrips.map(trip => `
                <div class="journal-entry" data-trip-id="${trip.id}">
                    <div class="entry-header">
                        <h3 class="entry-title">${trip.title}</h3>
                        <span class="entry-date">${formatDate(trip.date)}</span>
                    </div>
                    <div class="entry-location">
                        <i class="fas fa-map-marker-alt"></i> ${trip.location}
                    </div>
                    <div class="entry-rating">
                        <i class="fas fa-star"></i> ${generateStars(trip.rating)} (${trip.rating}/5)
                    </div>
                    <div class="entry-notes">${trip.notes}</div>
                    ${trip.photos.length > 0 ? `
                        <div class="entry-photos">
                            ${trip.photos.map(photo => `
                                <img src="${photo.data}" alt="Trip photo" class="photo-thumbnail" onclick="viewPhoto('${photo.data}')">
                            `).join('')}
                        </div>
                    ` : ''}
                    <div class="entry-actions" style="margin-top: 15px;">
                        <button class="btn btn-secondary" onclick="viewOnMap(${trip.lat}, ${trip.lng})" style="font-size: 12px; padding: 6px 12px;">
                            <i class="fas fa-map"></i> View on Map
                        </button>
                        <button class="btn btn-danger" onclick="deleteTrip(${trip.id})" style="font-size: 12px; padding: 6px 12px;">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleSatelliteView() {
            if (map.hasLayer(satelliteLayer)) {
                map.removeLayer(satelliteLayer);
                map.addLayer(streetLayer);
            } else {
                map.removeLayer(streetLayer);
                map.addLayer(satelliteLayer);
            }
        }

        function centerMap() {
            if (trips.length > 0) {
                const bounds = L.latLngBounds();
                trips.forEach(trip => {
                    bounds.extend([trip.lat, trip.lng]);
                });
                map.fitBounds(bounds, { padding: [20, 20] });
            } else {
                map.setView([40.7128, -74.0060], 2);
            }
        }

        function toggleHeatmap() {
            // Simulate heatmap toggle (in a real app, you'd use a heatmap library)
            heatmapVisible = !heatmapVisible;
            const btn = document.querySelector('[onclick="toggleHeatmap()"]');
            
            if (heatmapVisible) {
                btn.style.background = 'var(--primary-color)';
                btn.style.color = 'white';
                showNotification('Heatmap view enabled', 'success');
            } else {
                btn.style.background = 'rgba(255, 255, 255, 0.9)';
                btn.style.color = 'inherit';
                showNotification('Heatmap view disabled', 'success');
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(trips, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `travel_journal_${new Date().toISOString().split('T')[0]}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showNotification('Data exported successfully!', 'success');
        }

        function generateReport() {
            const reportData = {
                totalTrips: trips.length,
                countries: new Set(trips.map(trip => trip.country)).size,
                averageRating: trips.reduce((sum, trip) => sum + trip.rating, 0) / trips.length || 0,
                mostVisitedCountry: getMostVisitedCountry(),
                favoriteType: getMostCommonTripType(),
                totalPhotos: trips.reduce((sum, trip) => sum + trip.photos.length, 0),
                recentActivity: trips.filter(trip => {
                    const oneMonthAgo = new Date();
                    oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
                    return new Date(trip.date) > oneMonthAgo;
                }).length
            };
            
            const reportModal = document.createElement('div');
            reportModal.className = 'modal';
            reportModal.style.display = 'block';
            reportModal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title">Travel Analytics Report</h2>
                        <button class="close-btn" onclick="this.closest('.modal').remove()">×</button>
                    </div>
                    <div style="padding: 20px 0;">
                        <h3>Travel Statistics</h3>
                        <p><strong>Total Trips:</strong> ${reportData.totalTrips}</p>
                        <p><strong>Countries Visited:</strong> ${reportData.countries}</p>
                        <p><strong>Average Rating:</strong> ${reportData.averageRating.toFixed(1)}/5</p>
                        <p><strong>Most Visited Country:</strong> ${reportData.mostVisitedCountry}</p>
                        <p><strong>Favorite Trip Type:</strong> ${reportData.favoriteType}</p>
                        <p><strong>Total Photos:</strong> ${reportData.totalPhotos}</p>
                        <p><strong>Recent Activity (30 days):</strong> ${reportData.recentActivity} trips</p>
                        
                        <h3 style="margin-top: 30px;">Recommendations</h3>
                        <ul style="margin-left: 20px; color: var(--text-light);">
                            <li>Consider exploring new countries to increase your travel diversity</li>
                            <li>Document more photos to preserve memories</li>
                            <li>Try different types of travel experiences</li>
                            <li>Share your favorite destinations with friends</li>
                        </ul>
                    </div>
                </div>
            `;
            document.body.appendChild(reportModal);
        }

        function getMostVisitedCountry() {
            const countryCount = {};
            trips.forEach(trip => {
                countryCount[trip.country] = (countryCount[trip.country] || 0) + 1;
            });
            
            let mostVisited = '';
            let maxCount = 0;
            for (const [country, count] of Object.entries(countryCount)) {
                if (count > maxCount) {
                    maxCount = count;
                    mostVisited = country;
                }
            }
            
            return mostVisited || 'N/A';
        }

        function getMostCommonTripType() {
            const typeCount = {};
            trips.forEach(trip => {
                typeCount[trip.type] = (typeCount[trip.type] || 0) + 1;
            });
            
            let mostCommon = '';
            let maxCount = 0;
            for (const [type, count] of Object.entries(typeCount)) {
                if (count > maxCount) {
                    maxCount = count;
                    mostCommon = type;
                }
            }
            
            return mostCommon || 'N/A';
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        function saveTrips() {
            // In a real application, you would save to a database
            // For this demo, we'll simulate saving to local storage
            console.log('Saving trips to database...', trips);
        }

        function loadTrips() {
            // In a real application, you would load from a database
            // For this demo, we'll start with empty trips array
            renderTrips();
            
            // Load markers for existing trips
            trips.forEach(trip => {
                addMarkerToMap(trip);
            });
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAddTripModal();
            }
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                openAddTripModal();
            }
        });

        // Auto-save functionality
        setInterval(() => {
            if (trips.length > 0) {
                saveTrips();
            }
        }, 30000); // Auto-save every 30 seconds
    </script>
